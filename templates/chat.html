<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Medical Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #f8fafc;
        }

        /* ── SIDEBAR ─────────────────────────────── */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: #111827;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: width 0.25s ease, min-width 0.25s ease;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar.collapsed { width: 0; min-width: 0; }

        .sidebar-top {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .new-chat-btn:hover { background: #1d4ed8; }

        .sidebar-section-label {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            padding: 14px 14px 6px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px 8px;
        }
        .conversation-list::-webkit-scrollbar { width: 4px; }
        .conversation-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

        .conv-item {
            display: flex;
            align-items: center;
            padding: 9px 10px;
            border-radius: 8px;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            font-size: 13.5px;
            transition: background 0.15s, color 0.15s;
            gap: 8px;
            margin-bottom: 1px;
            min-width: 0;
        }
        .conv-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
        .conv-item.active { background: rgba(37,99,235,0.25); color: #fff; }

        .conv-icon { flex-shrink: 0; opacity: 0.5; }
        .conv-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .conv-delete {
            flex-shrink: 0;
            opacity: 0;
            background: none;
            border: none;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            display: flex;
            transition: opacity 0.15s, color 0.15s;
        }
        .conv-item:hover .conv-delete { opacity: 1; }
        .conv-delete:hover { color: #f87171 !important; }

        .empty-convs {
            text-align: center;
            padding: 24px 14px;
            color: rgba(255,255,255,0.25);
            font-size: 13px;
            white-space: nowrap;
        }

        .sidebar-footer {
            padding: 12px 14px;
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* ── MAIN AREA ───────────────────────────── */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 13px 20px;
            border-bottom: 1px solid #e5e7eb;
            background: #fff;
            gap: 12px;
            flex-shrink: 0;
        }

        .toggle-btn {
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            border-radius: 7px;
            color: #6b7280;
            display: flex;
            align-items: center;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .toggle-btn:hover { background: #f3f4f6; color: #111827; }

        .header-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366f1, #2563eb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        .header-title { font-weight: 600; font-size: 15px; color: #111827; }
        .header-sub { font-size: 12px; color: #10b981; display: flex; align-items: center; gap: 4px; margin-top: 1px; }
        .status-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; }

        /* ── MESSAGES ────────────────────────────── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

        .welcome-msg {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
            min-height: 200px;
        }
        .welcome-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1, #2563eb);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            color: white;
        }
        .welcome-msg h2 { font-size: 21px; font-weight: 600; color: #111827; margin-bottom: 8px; }
        .welcome-msg p { font-size: 14px; color: #9ca3af; }

        .msg-row { display: flex; align-items: flex-end; gap: 8px; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.bot  { justify-content: flex-start; }

        .bot-avatar {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #6366f1, #2563eb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 600;
        }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 68%; }
        .msg-row.user .msg-wrapper { align-items: flex-end; }
        .msg-row.bot  .msg-wrapper { align-items: flex-start; }

        .msg-bubble {
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.65;
            word-wrap: break-word;
        }
        .msg-row.user .msg-bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
        .msg-row.bot  .msg-bubble { background: #f3f4f6; color: #111827; border-bottom-left-radius: 4px; }

        .msg-time { font-size: 11px; color: #9ca3af; margin-top: 4px; }

        /* Typing dots */
        .typing-dots { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
        .typing-dots span {
            width: 7px; height: 7px;
            background: #9ca3af; border-radius: 50%;
            animation: tdot 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes tdot {
            0%,60%,100% { transform: translateY(0); }
            30%          { transform: translateY(-5px); }
        }

        /* ── INPUT AREA ──────────────────────────── */
        .chat-input-area {
            padding: 14px 24px 18px;
            border-top: 1px solid #e5e7eb;
            background: #fff;
            flex-shrink: 0;
        }

        .input-form {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            padding: 8px 12px;
            transition: border-color 0.2s, background 0.2s;
        }
        .input-form:focus-within { border-color: #2563eb; background: #fff; }

        .input-form input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #111827;
        }
        .input-form input::placeholder { color: #9ca3af; }

        .send-btn {
            background: #2563eb;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #1d4ed8; }
        .send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

        .input-hint { text-align: center; font-size: 11px; color: #c4c9d4; margin-top: 8px; }

        /* ── MOBILE ──────────────────────────────── */
        @media (max-width: 640px) {
            .sidebar {
                position: fixed;
                height: 100vh;
                z-index: 200;
                box-shadow: 4px 0 24px rgba(0,0,0,0.35);
            }
            .msg-wrapper { max-width: 82%; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <button class="new-chat-btn" id="new-chat-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New Chat
        </button>
    </div>
    <div class="sidebar-section-label">Conversations</div>
    <div class="conversation-list" id="conversation-list">
        <div class="empty-convs">No conversations yet</div>
    </div>
    <div class="sidebar-footer">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="color:#e53e3e">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7v-2h4V7h2v4h4v2h-4v4h-2z"/>
        </svg>
        AI Medical Assistant
    </div>
</aside>

<!-- MAIN -->
<main class="main-area">
    <!-- Header -->
    <div class="chat-header">
        <button class="toggle-btn" id="sidebar-toggle" title="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <div class="header-avatar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7v-2h4V7h2v4h4v2h-4v4h-2z"/>
            </svg>
        </div>
        <div>
            <div class="header-title">AI Medical Assistant</div>
            <div class="header-sub"><span class="status-dot"></span> Online</div>
        </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-body">
        <div class="welcome-msg" id="welcome-msg">
            <div class="welcome-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7v-2h4V7h2v4h4v2h-4v4h-2z"/>
                </svg>
            </div>
            <h2>How can I help you today?</h2>
            <p>Ask me any medical question and I'll do my best to assist.</p>
        </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
        <form class="input-form" id="message-form">
            <input type="text" id="text" placeholder="Ask a medical question..." autocomplete="off" />
            <button type="submit" class="send-btn" id="send-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </form>
        <div class="input-hint">AI responses are informational only — always consult a qualified doctor for medical advice.</div>
    </div>
</main>

<script>
    let currentConvId = null;
    let isLoading = false;

    // ── Helpers ──────────────────────────────────────────────────────────────
    function scrollToBottom() {
        const el = document.getElementById('chat-body');
        el.scrollTop = el.scrollHeight;
    }

    function getTime() {
        const d = new Date();
        return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function esc(str) {
        return $('<div>').text(str).html();
    }

    function welcomeHTML() {
        return `<div class="welcome-msg" id="welcome-msg">
            <div class="welcome-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7v-2h4V7h2v4h4v2h-4v4h-2z"/>
                </svg>
            </div>
            <h2>How can I help you today?</h2>
            <p>Ask me any medical question and I'll do my best to assist.</p>
        </div>`;
    }

    function msgHTML(role, content, time) {
        time = time || getTime();
        if (role === 'user') {
            return `<div class="msg-row user">
                <div class="msg-wrapper">
                    <div class="msg-bubble">${esc(content)}</div>
                    <div class="msg-time">${time}</div>
                </div>
            </div>`;
        }
        return `<div class="msg-row bot">
            <div class="bot-avatar">AI</div>
            <div class="msg-wrapper">
                <div class="msg-bubble">${esc(content)}</div>
                <div class="msg-time">${time}</div>
            </div>
        </div>`;
    }

    const typingHTML = `<div id="bot-typing" class="msg-row bot">
        <div class="bot-avatar">AI</div>
        <div class="msg-wrapper">
            <div class="msg-bubble">
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
        </div>
    </div>`;

    // ── Sidebar toggle ───────────────────────────────────────────────────────
    $('#sidebar-toggle').on('click', function () {
        $('#sidebar').toggleClass('collapsed');
    });

    // ── Load conversation list ───────────────────────────────────────────────
    function loadConversations(activeId) {
        $.get('/api/conversations', function (convs) {
            const list = $('#conversation-list');
            list.empty();
            if (!convs.length) {
                list.html('<div class="empty-convs">No conversations yet</div>');
                return;
            }
            const active = activeId !== undefined ? activeId : currentConvId;
            convs.forEach(function (conv) {
                list.append(`
                    <div class="conv-item ${conv.id === active ? 'active' : ''}" data-id="${conv.id}">
                        <svg class="conv-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        <span class="conv-title">${esc(conv.title)}</span>
                        <button class="conv-delete" data-id="${conv.id}" title="Delete conversation">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6l-1 14H6L5 6"/>
                                <path d="M10 11v6M14 11v6"/>
                            </svg>
                        </button>
                    </div>
                `);
            });
        });
    }

    // ── Click conversation ───────────────────────────────────────────────────
    $(document).on('click', '.conv-item', function (e) {
        if ($(e.target).closest('.conv-delete').length) return;
        loadConversationMessages($(this).data('id'));
    });

    function loadConversationMessages(convId) {
        $.get('/api/conversations/' + convId, function (data) {
            currentConvId = convId;
            const body = $('#chat-body');
            body.empty();

            if (!data.messages.length) {
                body.html(welcomeHTML());
            } else {
                data.messages.forEach(function (m) {
                    body.append(msgHTML(m.role, m.content, m.timestamp));
                });
            }

            loadConversations(convId);
            scrollToBottom();
            if (window.innerWidth <= 640) $('#sidebar').addClass('collapsed');
        });
    }

    // ── Delete conversation ──────────────────────────────────────────────────
    $(document).on('click', '.conv-delete', function (e) {
        e.stopPropagation();
        const convId = $(this).data('id');
        if (!confirm('Delete this conversation?')) return;
        $.ajax({
            url: '/api/conversations/' + convId,
            type: 'DELETE',
            success: function () {
                if (currentConvId === convId) startNewChat();
                else loadConversations();
            }
        });
    });

    // ── New chat ─────────────────────────────────────────────────────────────
    function startNewChat() {
        currentConvId = null;
        $('#chat-body').html(welcomeHTML());
        loadConversations(null);
        $('#text').focus();
    }

    $('#new-chat-btn').on('click', function () {
        startNewChat();
        if (window.innerWidth <= 640) $('#sidebar').addClass('collapsed');
    });

    // ── Send message ─────────────────────────────────────────────────────────
    $('#message-form').on('submit', function (e) {
        e.preventDefault();
        if (isLoading) return;
        const msg = $('#text').val().trim();
        if (!msg) return;

        isLoading = true;
        $('#send-btn').prop('disabled', true);
        $('#text').val('');

        $('#welcome-msg').remove();
        $('#chat-body').append(msgHTML('user', msg));
        $('#chat-body').append(typingHTML);
        scrollToBottom();

        $.ajax({
            url: '/get',
            type: 'POST',
            data: { msg: msg, conversation_id: currentConvId || '' },
            success: function (data) {
                $('#bot-typing').remove();
                if (data.conversation_id) currentConvId = data.conversation_id;
                $('#chat-body').append(msgHTML('bot', data.response));
                scrollToBottom();
                loadConversations(currentConvId);
            },
            error: function () {
                $('#bot-typing').remove();
                $('#chat-body').append(msgHTML('bot', 'Sorry, something went wrong. Please try again.'));
                scrollToBottom();
            },
            complete: function () {
                isLoading = false;
                $('#send-btn').prop('disabled', false);
                $('#text').focus();
            }
        });
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    loadConversations();
</script>
</body>
</html>
